name: AI-TestFlow 测试工程师 Agent
version: 0.2.0
description: 基于本地测试知识、实时 HTTP 和结构化浏览器观察完成需求分析、探索测试、缺陷判断、报告生成与回归脚本沉淀。
entrypoint:
  type: local_cli
  command:
    - conda
    - run
    - --no-capture-output
    - -n
    - AI-TestFlow
    - python
    - -m
    - ai_testflow
    - agent-run
config_path: ai-testflow.yml
inputs:
  prd: docs/prd.md
  knowledge_base: knowledge/testing
excluded_inputs:
  defect_ground_truth: docs/samples/demo-defect-ground-truth.md
outputs:
  output_dir: ai-testflow-runs/latest
  workflow_state: ai-testflow-runs/latest/workflow-state.json
  inspection_summary: ai-testflow-runs/latest/inspection-summary.json
  prd_analysis: ai-testflow-runs/latest/prd-analysis.json
  knowledge_context: ai-testflow-runs/latest/knowledge-context.json
  requirements: ai-testflow-runs/latest/requirements.json
  test_points: ai-testflow-runs/latest/test-points.json
  test_charters: ai-testflow-runs/latest/test-charters.json
  api_actions: ai-testflow-runs/latest/api-action-log.jsonl
  api_observations: ai-testflow-runs/latest/api-observations.jsonl
  browser_actions: ai-testflow-runs/latest/browser-action-log.jsonl
  browser_observations: ai-testflow-runs/latest/browser-observations.jsonl
  execution_result: ai-testflow-runs/latest/execution-result.json
  defect_analysis: ai-testflow-runs/latest/defect-analysis.json
  automation_manifest: ai-testflow-runs/latest/automation-manifest.json
  generated_test_report: ai-testflow-runs/latest/generated-test-report.md
  generated_bug_report: ai-testflow-runs/latest/generated-bug-report.md
workflow_stages:
  - PRD分析
  - 测试知识检索
  - 需求与风险拆解
  - 探索测试任务设计
  - 实时API测试
  - 实时浏览器测试
  - 执行结果分类
  - 回归脚本沉淀
  - 测试报告生成
  - Bug单生成
guardrails:
  - 首次执行前不生成测试脚本
  - 不读取完整前端源码或缺陷基准文件
  - 不允许模型输出CSS Selector、XPath或JavaScript
  - 只有product_defect分类可以生成Bug
  - 只有passed轨迹可以进入Automation Agent
